<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户信息展示 - 电销通话辅助</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1f2937;
      background: #e5e7eb;
      min-height: 100vh;
    }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
      transition: opacity 0.25s ease;
    }
    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Modal ── */
    .modal {
      width: 960px;
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .overlay.hidden .modal {
      transform: scale(0.97);
      opacity: 0;
    }

    /* ── Header ── */
    .modal-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .header-title-group h1 {
      font-size: 17px;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
    }
    .header-title-group .subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .btn-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      color: #6b7280;
      font-size: 20px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .btn-close:hover { background: #e5e7eb; color: #111827; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Body ── */
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    /* ── State panels ── */
    .state-panel { display: none; }
    .state-panel.active { display: block; }

    /* Loading */
    .loading-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #4b5563; }

    /* Skeleton */
    .skeleton-block {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 14px;
      margin-bottom: 10px;
    }
    .skeleton-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Empty / Error / Invalid */
    .feedback-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 20px;
      text-align: center;
    }
    .feedback-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }
    .feedback-icon.empty  { background: #f3f4f6; color: #9ca3af; }
    .feedback-icon.error  { background: #fef2f2; color: #dc2626; }
    .feedback-icon.invalid { background: #fff7ed; color: #ea580c; }
    .feedback-title {
      font-size: 15px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    .feedback-desc {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: #2563eb; }
    .btn-refresh:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .btn-refresh .btn-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-refresh.loading .btn-spinner { display: block; }
    .btn-refresh.loading .btn-label { display: none; }
    .btn-refresh.loading .btn-loading-label { display: inline; }
    .btn-refresh .btn-loading-label { display: none; }

    .retry-hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 10px;
      display: none;
    }
    .retry-hint.visible { display: block; }

    /* ── Content cards ── */
    .section-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-card.highlight {
      border-color: #bfdbfe;
      box-shadow: 0 0 0 1px #dbeafe;
    }
    .section-header {
      padding: 10px 14px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-card.highlight .section-header {
      background: #eff6ff;
      border-bottom-color: #dbeafe;
      color: #1e40af;
    }
    .section-body { padding: 12px 14px; }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px 20px;
    }
    @media (max-width: 720px) {
      .field-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .field-grid { grid-template-columns: 1fr; }
    }

    .field-item {}
    .field-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 2px;
    }
    .field-value {
      font-size: 14px;
      color: #111827;
      word-break: break-all;
    }
    .field-item.primary .field-value {
      font-size: 16px;
      font-weight: 600;
      color: #1e40af;
    }

    /* Status tags in status section */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .tag-green  { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .tag-blue   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .tag-gray   { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
    .tag-amber  { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }

    /* Business notes */
    .note-block {
      background: #f9fafb;
      border-left: 3px solid #93c5fd;
      padding: 10px 12px;
      border-radius: 0 4px 4px 0;
      margin-bottom: 8px;
      font-size: 13px;
      color: #4b5563;
      line-height: 1.6;
    }
    .note-block:last-child { margin-bottom: 0; }
    .note-label {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 4px;
    }

    /* System info – muted */
    .system-info {
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px dashed #e5e7eb;
    }
    .system-info .section-card {
      background: #fafafa;
      border-color: #f0f0f0;
    }
    .system-info .section-header {
      background: transparent;
      border-bottom: none;
      padding-bottom: 0;
      font-size: 12px;
      color: #9ca3af;
      font-weight: 500;
    }
    .system-info .section-body { padding-top: 6px; }
    .system-info .field-label,
    .system-info .field-value {
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── Footer demo bar ── */
    .modal-footer {
      padding: 10px 20px;
      border-top: 1px solid #e5e7eb;
      background: #f8fafc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .demo-label {
      font-size: 12px;
      color: #9ca3af;
      margin-right: 4px;
    }
    .demo-btn {
      padding: 4px 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
      transition: all 0.15s;
    }
    .demo-btn:hover { border-color: #3b82f6; color: #2563eb; }
    .demo-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    /* Reopen hint when closed */
    .reopen-hint {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(59,130,246,0.35);
      z-index: 999;
      display: none;
    }
    .reopen-hint.visible { display: block; }
    .reopen-hint:hover { background: #2563eb; }
  </style>
</head>
<body>

  <!-- Overlay + Modal -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <!-- Header -->
      <div class="modal-header">
        <div class="header-top">
          <div class="header-title-group">
            <h1 id="modal-title">用户信息展示</h1>
            <div class="subtitle">电销通话辅助信息</div>
          </div>
          <div class="header-actions">
            <button class="btn-close" id="btnClose" title="关闭" aria-label="关闭弹窗">&times;</button>
          </div>
        </div>
      </div>

      <!-- Body -->
      <div class="modal-body" id="modalBody">

        <!-- Loading -->
        <div class="state-panel active" id="panel-loading">
          <div class="loading-center">
            <div class="spinner"></div>
            <div class="loading-text">正在获取用户信息</div>
          </div>
          <div style="padding: 0 4px;">
            <div class="skeleton-card">
              <div class="skeleton-block" style="width:30%"></div>
              <div class="skeleton-block" style="width:60%"></div>
              <div class="skeleton-block" style="width:45%"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-block" style="width:40%"></div>
              <div class="skeleton-block" style="width:55%"></div>
            </div>
          </div>
        </div>

        <!-- Success -->
        <div class="state-panel" id="panel-success">
          <!-- 基础信息区 -->
          <div class="section-card highlight">
            <div class="section-header">基础信息</div>
            <div class="section-body">
              <div class="field-grid" id="basicFields"></div>
            </div>
          </div>

          <!-- 账号信息区 -->
          <div class="section-card">
            <div class="section-header">账号信息</div>
            <div class="section-body">
              <div class="field-grid" id="accountFields"></div>
            </div>
          </div>

          <!-- 状态信息区 -->
          <div class="section-card">
            <div class="section-header">状态信息</div>
            <div class="section-body">
              <div class="field-grid" id="statusFields"></div>
              <div class="tag-list" id="statusTags" style="margin-top:10px"></div>
            </div>
          </div>

          <!-- 业务辅助信息区 -->
          <div class="section-card">
            <div class="section-header">业务辅助信息</div>
            <div class="section-body" id="businessFields"></div>
          </div>

          <!-- 系统信息区 -->
          <div class="system-info">
            <div class="section-card">
              <div class="section-header">系统信息</div>
              <div class="section-body">
                <div class="field-grid" id="systemFields"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Empty -->
        <div class="state-panel" id="panel-empty">
          <div class="feedback-center">
            <div class="feedback-icon empty">&#8709;</div>
            <div class="feedback-title">未查询到对应用户信息</div>
            <div class="feedback-desc">请确认用户 ID 是否正确，或联系管理员核实</div>
          </div>
        </div>

        <!-- Error -->
        <div class="state-panel" id="panel-error">
          <div class="feedback-center">
            <div class="feedback-icon error">!</div>
            <div class="feedback-title">用户信息获取失败，请稍后重试</div>
            <div class="feedback-desc">查询服务暂时不可用，您可以尝试刷新重新获取</div>
            <button class="btn-refresh" id="btnRefresh">
              <span class="btn-spinner"></span>
              <span class="btn-label">刷新</span>
              <span class="btn-loading-label">重新查询中…</span>
            </button>
            <div class="retry-hint" id="retryHint">正在重新查询用户信息，请稍候…</div>
          </div>
        </div>

        <!-- Invalid -->
        <div class="state-panel" id="panel-invalid">
          <div class="feedback-center">
            <div class="feedback-icon invalid">?</div>
            <div class="feedback-title">缺少用户ID或用户ID格式错误</div>
            <div class="feedback-desc">请检查第三方系统传入的 accId 参数是否有效</div>
          </div>
        </div>

      </div>

      <!-- Demo footer -->
      <div class="modal-footer">
        <span class="demo-label">演示切换：</span>
        <button class="demo-btn" data-state="loading">loading</button>
        <button class="demo-btn" data-state="success">success</button>
        <button class="demo-btn" data-state="empty">empty</button>
        <button class="demo-btn" data-state="error">error</button>
        <button class="demo-btn" data-state="invalid">invalid</button>
      </div>
    </div>
  </div>

  <button class="reopen-hint" id="btnReopen">重新打开弹窗</button>

  <script>
    /* ── Mock 数据 ── */
    const MOCK_ACC_ID = "ACC20250625001847";

    const mockData = {
      accId: MOCK_ACC_ID,
      fieldA: "张三",
      fieldB: "138****6721",
      fieldC: "北京市朝阳区",
      fieldD: "普通会员",
      fieldE: "2023-08-15 注册",
      fieldF: "渠道来源：线上推广",
      fieldG: "账户正常",
      fieldH: "近30天活跃",
      fieldI: "无风险标记",
      fieldJ: "用户偏好晚间沟通，对价格较敏感",
      fieldK: "上次咨询产品：企业版套餐",
      fieldL: "备注：曾申请试用，试用期已于 2024-12 到期",
      queryTime: "",
      dataSource: "用户中心 · 星灵校验",
      queryStatus: "查询成功"
    };

    let currentState = "loading";
    let autoTimer = null;

    /* ── DOM refs ── */
    const overlay    = document.getElementById("overlay");
    const btnClose    = document.getElementById("btnClose");
    const btnReopen   = document.getElementById("btnReopen");
    const btnRefresh  = document.getElementById("btnRefresh");
    const retryHint   = document.getElementById("retryHint");
    const demoBtns    = document.querySelectorAll(".demo-btn");

    const panels = {
      loading: document.getElementById("panel-loading"),
      success: document.getElementById("panel-success"),
      empty:   document.getElementById("panel-empty"),
      error:   document.getElementById("panel-error"),
      invalid: document.getElementById("panel-invalid")
    };

    /* ── 解析 URL accId（模拟接收参数） ── */
    function getAccIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("accId") || MOCK_ACC_ID;
    }

    function formatNow() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    /* ── 渲染 success 内容 ── */
    function renderSuccess() {
      const accId = getAccIdFromUrl();
      mockData.accId = accId;
      mockData.queryTime = formatNow();

      renderFieldGrid("basicFields", [
        { label: "acc ID", value: mockData.accId, primary: true },
        { label: "字段A", value: mockData.fieldA },
        { label: "字段B", value: mockData.fieldB },
        { label: "字段C", value: mockData.fieldC }
      ]);

      renderFieldGrid("accountFields", [
        { label: "字段D", value: mockData.fieldD },
        { label: "字段E", value: mockData.fieldE },
        { label: "字段F", value: mockData.fieldF }
      ]);

      renderFieldGrid("statusFields", [
        { label: "字段G", value: mockData.fieldG },
        { label: "字段H", value: mockData.fieldH },
        { label: "字段I", value: mockData.fieldI }
      ]);

      document.getElementById("statusTags").innerHTML = `
        <span class="tag tag-green">${mockData.fieldG}</span>
        <span class="tag tag-blue">${mockData.fieldH}</span>
        <span class="tag tag-gray">${mockData.fieldI}</span>
      `;

      document.getElementById("businessFields").innerHTML = `
        <div class="note-block">
          <div class="note-label">字段J</div>
          ${mockData.fieldJ}
        </div>
        <div class="note-block">
          <div class="note-label">字段K</div>
          ${mockData.fieldK}
        </div>
        <div class="note-block">
          <div class="note-label">字段L</div>
          ${mockData.fieldL}
        </div>
      `;

      renderFieldGrid("systemFields", [
        { label: "查询时间", value: mockData.queryTime },
        { label: "数据来源", value: mockData.dataSource },
        { label: "查询状态", value: mockData.queryStatus }
      ]);
    }

    function renderFieldGrid(containerId, fields) {
      const el = document.getElementById(containerId);
      el.innerHTML = fields.map(f => `
        <div class="field-item${f.primary ? " primary" : ""}">
          <div class="field-label">${f.label}</div>
          <div class="field-value">${f.value}</div>
        </div>
      `).join("");
    }

    /* ── 状态切换 ── */
    function setState(state) {
      currentState = state;

      Object.keys(panels).forEach(key => {
        panels[key].classList.toggle("active", key === state);
      });

      demoBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.state === state);
      });

      if (state === "success") {
        renderSuccess();
      }
    }

    function clearAutoTimer() {
      if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
    }

    /* ── 模拟自动查询流程 ── */
    function simulateAutoQuery() {
      clearAutoTimer();
      setState("loading");
      autoTimer = setTimeout(() => {
        setState("success");
      }, 1000);
    }

    /* ── 刷新重试（error → loading → success） ── */
    function handleRefresh() {
      btnRefresh.classList.add("loading");
      btnRefresh.disabled = true;
      retryHint.classList.add("visible");

      setState("loading");

      clearAutoTimer();
      autoTimer = setTimeout(() => {
        btnRefresh.classList.remove("loading");
        btnRefresh.disabled = false;
        retryHint.classList.remove("visible");
        setState("success");
      }, 1000);
    }

    /* ── 关闭 / 打开弹窗 ── */
    function closeModal() {
      overlay.classList.add("hidden");
      btnReopen.classList.add("visible");
    }
    function openModal() {
      overlay.classList.remove("hidden");
      btnReopen.classList.remove("visible");
    }

    /* ── 事件绑定 ── */
    btnClose.addEventListener("click", closeModal);
    btnReopen.addEventListener("click", openModal);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeModal();
    });
    btnRefresh.addEventListener("click", handleRefresh);

    demoBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        clearAutoTimer();
        const state = btn.dataset.state;
        if (state === "loading") {
          setState("loading");
        } else {
          setState(state);
        }
      });
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !overlay.classList.contains("hidden")) {
        closeModal();
      }
    });

    /* ── 初始化：模拟接收 accId 后自动查询 ── */
    simulateAutoQuery();
  </script>
</body>
</html>
