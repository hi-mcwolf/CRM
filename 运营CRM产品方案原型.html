<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运营CRM产品方案原型</title>
  <style>
    /* === Design Tokens === */
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --line: #e8eaed;
      --line-strong: #d9dde3;
      --text: #1a1f2e;
      --text-2: #4b5563;
      --muted: #8c8c8c;
      --primary: #01696f;
      --primary-hover: #01585d;
      --primary-soft: #e6f3f4;
      --danger: #c2413c;
      --danger-soft: #fef2f2;
      --success: #0f766e;
      --success-soft: #ecfdf5;
      --warn: #b45309;
      --warn-soft: #fffbeb;
      --info: #2563eb;
      --info-soft: #eff6ff;
      --purple: #7c3aed;
      --purple-soft: #f5f3ff;
      --shadow: 0 1px 2px rgba(16,24,40,.06);
      --shadow-lg: 0 8px 24px rgba(16,24,40,.12);
      --radius: 10px;
      --sidebar-w: 220px;
      --header-h: 56px;
      --drawer-w: 640px;
    }
    [data-theme="dark"] {
      --bg: #111827;
      --card: #1f2937;
      --line: #374151;
      --line-strong: #4b5563;
      --text: #f3f4f6;
      --text-2: #d1d5db;
      --muted: #9ca3af;
      --primary-soft: #134e4a;
      --danger-soft: #450a0a;
      --success-soft: #064e3b;
      --warn-soft: #451a03;
      --info-soft: #1e3a5f;
      --purple-soft: #3b0764;
      --shadow: 0 1px 2px rgba(0,0,0,.3);
      --shadow-lg: 0 8px 24px rgba(0,0,0,.4);
    }

    /* === Base === */
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      min-width: 1360px;
    }
    button, input, select, textarea { font: inherit; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* === Layout === */
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-w);
      background: var(--card);
      border-right: 1px solid var(--line);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 20;
    }
    .brand { padding: 16px; border-bottom: 1px solid var(--line); }
    .brand-title { font-size: 15px; font-weight: 700; color: var(--primary); }
    .brand-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .nav-group { padding: 8px 0; flex: 1; overflow: auto; }
    .nav-l1 { padding: 10px 16px 6px; font-size: 12px; font-weight: 600; color: var(--muted); }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px 9px 20px;
      color: var(--text-2);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .15s;
    }
    .nav-item:hover { background: var(--primary-soft); color: var(--primary); }
    .nav-item.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-left-color: var(--primary);
      font-weight: 600;
    }
    .nav-item.disabled { opacity: .45; cursor: not-allowed; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-foot { padding: 12px 16px; border-top: 1px solid var(--line); font-size: 11px; color: var(--muted); }

    .main-wrap { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .header {
      height: var(--header-h);
      background: var(--card);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 15;
    }
    .header-left { display: flex; flex-direction: column; min-width: 180px; }
    .header-title { font-size: 16px; font-weight: 600; line-height: 1.2; }
    .breadcrumb { font-size: 12px; color: var(--muted); }
    .breadcrumb span { margin: 0 4px; }
    .header-search { flex: 1; max-width: 360px; position: relative; }
    .header-search input {
      width: 100%; height: 34px; padding: 0 12px 0 34px;
      border: 1px solid var(--line-strong); border-radius: 8px;
      background: var(--bg); color: var(--text);
    }
    .header-search input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
    .header-search .search-icon { position: absolute; left: 10px; top: 9px; color: var(--muted); }
    .search-panel {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--line); border-radius: 8px;
      box-shadow: var(--shadow-lg); display: none; max-height: 280px; overflow: auto; z-index: 50;
    }
    .search-panel.open { display: block; }
    .search-panel .sp-title { padding: 8px 12px; font-size: 11px; color: var(--muted); font-weight: 600; }
    .search-panel .sp-item {
      padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    }
    .search-panel .sp-item:hover { background: var(--primary-soft); }
    .header-tools { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .date-pill {
      display: flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    }
    .date-pill button {
      padding: 6px 12px; border: 0; background: transparent; cursor: pointer; color: var(--text-2);
    }
    .date-pill button.active { background: var(--primary); color: #fff; }
    .icon-btn {
      width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 8px;
      background: var(--card); cursor: pointer; display: grid; place-items: center; color: var(--text-2);
      position: relative;
    }
    .icon-btn:hover { border-color: var(--primary); color: var(--primary); }
    .badge-dot {
      position: absolute; top: -2px; right: -2px;
      width: 8px; height: 8px; border-radius: 50%; background: var(--danger);
    }
    .role-pill {
      padding: 6px 12px; border: 1px solid var(--line); border-radius: 16px;
      font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
      background: var(--card); color: var(--text);
    }
    .role-dropdown {
      position: absolute; top: calc(100% + 4px); right: 0;
      background: var(--card); border: 1px solid var(--line); border-radius: 8px;
      box-shadow: var(--shadow-lg); min-width: 140px; display: none; z-index: 50;
    }
    .role-dropdown.open { display: block; }
    .role-dropdown div { padding: 8px 12px; cursor: pointer; font-size: 13px; }
    .role-dropdown div:hover { background: var(--primary-soft); }
    .role-wrap { position: relative; }

    /* === Content === */
    .content { flex: 1; overflow: auto; padding: 16px 20px 32px; }
    .page-inner { max-width: 1440px; margin: 0 auto; }
    .recent-users { display: flex; align-items: center; gap: 8px; padding: 8px 0 12px; flex-wrap: wrap; }
    .recent-users .ru-label { font-size: 12px; color: var(--muted); }
    .ru-chip {
      display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 4px;
      border: 1px solid var(--line); border-radius: 20px; cursor: pointer; font-size: 12px;
      background: var(--card);
    }
    .ru-chip:hover { border-color: var(--primary); }
    .ru-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: #fff; font-size: 10px; display: grid; place-items: center;
    }
    .alert-banner {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: var(--warn-soft); border: 1px solid #fbbf24; border-radius: var(--radius);
      margin-bottom: 14px; font-size: 13px;
    }
    .alert-banner .ab-close { margin-left: auto; cursor: pointer; color: var(--muted); border: 0; background: none; }

    /* === Components === */
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .card-hd {
      padding: 12px 16px; border-bottom: 1px solid var(--line);
      font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .card-bd { padding: 14px 16px; }
    .kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 14px; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 14px 16px; box-shadow: var(--shadow);
    }
    .kpi-card .kpi-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .kpi-card .kpi-val { font-size: 22px; font-weight: 700; }
    .kpi-card .kpi-trend { font-size: 11px; margin-top: 4px; }
    .kpi-trend.up { color: var(--success); }
    .kpi-trend.down { color: var(--danger); }
    .chart-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
    .chart-box { height: 200px; position: relative; }
    .chart-box canvas { width: 100% !important; height: 100% !important; }
    .dist-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
    .dist-item { margin-bottom: 10px; }
    .dist-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    .dist-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .dist-fill { height: 100%; border-radius: 4px; transition: width .3s; }
    .split-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }
    .filters {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 14px;
    }
    .filters.collapsed .field.extra { display: none; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; color: var(--text-2); }
    .field input, .field select {
      height: 34px; padding: 0 10px; border: 1px solid var(--line-strong);
      border-radius: 8px; background: var(--card); color: var(--text); width: 100%;
    }
    .field input:focus, .field select:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
    .filter-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
    .btn {
      height: 34px; padding: 0 14px; border-radius: 8px; border: 1px solid var(--line-strong);
      background: var(--card); cursor: pointer; color: var(--text); font-size: 13px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); color: #fff; }
    .btn-ghost { border-color: transparent; background: transparent; }
    .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
    .btn-link { border: 0; background: none; color: var(--primary); padding: 0 4px; height: auto; cursor: pointer; }
    .btn-link:hover { text-decoration: underline; }
    .batch-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 0; align-items: center; }
    .batch-bar .sel-info { font-size: 12px; color: var(--muted); margin-right: 8px; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
    th { background: var(--bg); font-weight: 600; color: var(--text-2); font-size: 12px; position: sticky; top: 0; }
    tr:hover td { background: var(--primary-soft); }
    tr.clickable { cursor: pointer; }
    .tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
    }
    .tag-success { background: var(--success-soft); color: var(--success); }
    .tag-info { background: var(--info-soft); color: var(--info); }
    .tag-warn { background: var(--warn-soft); color: var(--warn); }
    .tag-danger { background: var(--danger-soft); color: var(--danger); }
    .tag-purple { background: var(--purple-soft); color: var(--purple); }
    .tag-muted { background: var(--bg); color: var(--muted); border: 1px solid var(--line); }
    .tag-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .priority-high { color: var(--danger); font-weight: 600; }
    .priority-mid { color: var(--warn); }
    .priority-low { color: var(--muted); }
    .pagination { display: flex; align-items: center; justify-content: flex-end; gap: 6px; padding: 12px 0 4px; }
    .pagination button {
      min-width: 32px; height: 32px; border: 1px solid var(--line); border-radius: 6px;
      background: var(--card); cursor: pointer; color: var(--text);
    }
    .pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }
    .warn-card {
      padding: 12px; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px;
      border-left: 3px solid var(--warn); background: var(--card);
    }
    .warn-card.severe { border-left-color: var(--danger); }
    .warn-card .wc-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .warn-card .wc-desc { font-size: 12px; color: var(--muted); }
    .rule-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .rule-estimate {
      padding: 16px; background: var(--primary-soft); border-radius: 8px; text-align: center;
    }
    .rule-estimate .re-num { font-size: 32px; font-weight: 700; color: var(--primary); }
    .rule-estimate .re-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; }
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before {
      content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px;
      width: 2px; background: var(--line);
    }
    .tl-item { position: relative; padding-bottom: 14px; }
    .tl-item::before {
      content: ''; position: absolute; left: -17px; top: 4px;
      width: 8px; height: 8px; border-radius: 50%; background: var(--primary); border: 2px solid var(--card);
    }
    .tl-time { font-size: 11px; color: var(--muted); }
    .tl-content { font-size: 13px; margin-top: 2px; }
    .ai-card {
      padding: 14px; border-radius: 8px; border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--purple-soft), var(--info-soft));
      margin-bottom: 10px;
    }
    .ai-card .ai-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .ai-card p { margin: 0; font-size: 13px; line-height: 1.6; color: var(--text-2); }
    .profile-card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .profile-item { padding: 10px; background: var(--bg); border-radius: 8px; }
    .profile-item .pi-label { font-size: 11px; color: var(--muted); }
    .profile-item .pi-val { font-size: 14px; font-weight: 600; margin-top: 2px; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .es-icon { font-size: 36px; margin-bottom: 8px; opacity: .5; }
    .skeleton { background: linear-gradient(90deg, var(--line) 25%, var(--bg) 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; height: 16px; margin-bottom: 8px; }
    .skeleton.h40 { height: 40px; }
    .skeleton.h200 { height: 200px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* === Drawer === */
    .drawer-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .drawer-mask.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: var(--drawer-w);
      background: var(--card); box-shadow: var(--shadow-lg); z-index: 101;
      transform: translateX(100%); transition: transform .25s;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer.batch-drawer { --drawer-w: 560px; width: 560px; }
    .drawer-hd {
      padding: 14px 18px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-hd h3 { margin: 0; font-size: 16px; }
    .drawer-close { border: 0; background: none; cursor: pointer; color: var(--muted); font-size: 20px; }
    .drawer-tabs { display: flex; border-bottom: 1px solid var(--line); padding: 0 18px; overflow: auto; }
    .drawer-tab {
      padding: 10px 14px; cursor: pointer; font-size: 13px; color: var(--muted);
      border-bottom: 2px solid transparent; white-space: nowrap;
    }
    .drawer-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .drawer-bd { flex: 1; overflow: auto; padding: 16px 18px; }
    .drawer-ft {
      padding: 12px 18px; border-top: 1px solid var(--line);
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    /* === Modal === */
    .modal-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
      display: none; place-items: center;
    }
    .modal-mask.open { display: grid; }
    .modal {
      background: var(--card); border-radius: var(--radius); width: 480px; max-width: 90vw;
      box-shadow: var(--shadow-lg); overflow: hidden;
    }
    .modal-hd { padding: 14px 18px; border-bottom: 1px solid var(--line); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
    .modal-bd { padding: 16px 18px; }
    .modal-ft { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 8px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--line-strong);
      border-radius: 8px; background: var(--card); color: var(--text);
    }
    .form-group textarea { min-height: 80px; resize: vertical; }

    /* === Toast === */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 10px 16px; background: var(--card); border: 1px solid var(--line);
      border-radius: 8px; box-shadow: var(--shadow-lg); font-size: 13px;
      animation: toastIn .25s; min-width: 200px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.warn { border-left: 3px solid var(--warn); }
    @keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* === Todo Panel === */
    .todo-panel {
      position: absolute; top: calc(100% + 6px); right: 0; width: 300px;
      background: var(--card); border: 1px solid var(--line); border-radius: 8px;
      box-shadow: var(--shadow-lg); display: none; z-index: 50;
    }
    .todo-panel.open { display: block; }
    .todo-panel .tp-hd { padding: 10px 14px; border-bottom: 1px solid var(--line); font-weight: 600; font-size: 13px; }
    .todo-item { padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 12px; cursor: pointer; }
    .todo-item:hover { background: var(--primary-soft); }
    .todo-item .ti-time { color: var(--muted); font-size: 11px; margin-top: 2px; }

  </style>
</head>
<body>
<div id="app" class="app"></div>
<div id="drawerRoot"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<script>

function drawLineChart(canvasId, labels, data, color) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = c.parentElement.getBoundingClientRect();
  c.width = rect.width * dpr; c.height = rect.height * dpr;
  c.style.width = rect.width + 'px'; c.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { t: 20, r: 16, b: 28, l: 40 };
  const max = Math.max(...data) * 1.1;
  const min = Math.min(...data) * 0.9;
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--line').trim();
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (H - pad.t - pad.b) * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad.l + (W - pad.l - pad.r) * i / (data.length - 1);
    const y = pad.t + (H - pad.t - pad.b) * (1 - (v - min) / (max - min));
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color || '#01696f';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = color || '#01696f';
  data.forEach((v, i) => {
    const x = pad.l + (W - pad.l - pad.r) * i / (data.length - 1);
    const y = pad.t + (H - pad.t - pad.b) * (1 - (v - min) / (max - min));
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
  });
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted').trim();
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  labels.forEach((l, i) => {
    const x = pad.l + (W - pad.l - pad.r) * i / (labels.length - 1);
    ctx.fillText(l, x, H - 8);
  });
}

function drawBarChart(canvasId, labels, data, colors) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = c.parentElement.getBoundingClientRect();
  c.width = rect.width * dpr; c.height = rect.height * dpr;
  c.style.width = rect.width + 'px'; c.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { t: 20, r: 16, b: 36, l: 40 };
  const max = Math.max(...data) * 1.15;
  ctx.clearRect(0, 0, W, H);
  const bw = (W - pad.l - pad.r) / data.length * 0.6;
  const gap = (W - pad.l - pad.r) / data.length;
  data.forEach((v, i) => {
    const x = pad.l + gap * i + gap * 0.2;
    const h = (H - pad.t - pad.b) * v / max;
    const y = H - pad.b - h;
    ctx.fillStyle = colors[i] || '#01696f';
    ctx.fillRect(x, y, bw, h);
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted').trim();
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(labels[i], x + bw / 2, H - 10);
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text').trim();
    ctx.fillText(v >= 1000 ? (v/1000).toFixed(1)+'k' : v, x + bw / 2, y - 4);
  });
}

function filterUsers() {
  let list = [...MOCK.users];
  const f = state.userFilters;
  if (f.keyword) {
    const kw = f.keyword.toLowerCase();
    list = list.filter(u => u.id.toLowerCase().includes(kw) || u.name.includes(kw) || u.phone.includes(kw));
  }
  if (f.tier) list = list.filter(u => u.tier === f.tier);
  if (f.team) list = list.filter(u => u.team === f.team);
  if (f.transfer) list = list.filter(u => u.transfer === f.transfer);
  return list;
}

function renderSearchPanel() {
  const q = state.searchQuery.toLowerCase();
  const items = q ? MOCK.searchIndex.filter(s => s.label.toLowerCase().includes(q) || s.id.toLowerCase().includes(q)) : MOCK.searchIndex;
  if (!items.length) return '<div class="sp-title">无匹配结果</div>';
  const groups = { user:'用户', batch:'批次', strategy:'策略' };
  let html = '';
  ['user','batch','strategy'].forEach(type => {
    const g = items.filter(i => i.type === type);
    if (g.length) {
      html += `<div class="sp-title">${groups[type]}</div>`;
      html += g.map(i => `<div class="sp-item" data-action="search-select" data-type="${i.type}" data-id="${i.id}">${esc(i.label)}</div>`).join('');
    }
  });
  return html;
}

  let body = '';
  if (state.modal === 'transfer') {
    body = `<div class="form-group"><label>目标团队</label><select><option>VIP运营组</option><option>平台运营组</option><option>市场运营组</option><option>电销团队</option></select></div>
      <div class="form-group"><label>流转原因</label><select><option>7日无转化</option><option>触达多次失败</option><option>用户层级变更</option><option>其他</option></select></div>
      <div class="form-group"><label>备注</label><textarea placeholder="补充说明..."></textarea></div>`;
  } else if (state.modal === 'strategy') {
    body = `<div class="form-group"><label>策略类型</label><select><option>VIP策略</option><option>平台策略</option><option>市场策略</option></select></div>
      <div class="form-group"><label>选择策略</label><select><option>VIP专属召回-7日未活跃</option><option>平台Push-充值激励</option><option>市场邮件-回流活动</option><option>VIP电销-专属优惠</option></select></div>
      <div class="form-group"><label>执行时间</label><input type="datetime-local" value="2025-06-25T10:00" /></div>`;
  } else {
    body = `<div class="form-group"><label>跟进方式</label><select><option>电话</option><option>在线客服</option><option>外呼</option><option>备注</option></select></div>
      <div class="form-group"><label>跟进内容</label><textarea placeholder="记录跟进详情..."></textarea></div>
      <div class="form-group"><label>跟进结果</label><select><option>待观察</option><option>有意向</option><option>无响应</option><option>已转化</option></select></div>
      <div class="form-group"><label>下次计划时间</label><input type="datetime-local" /></div>`;
  }
  return `<div class="modal-mask open" data-action="close-modal-bg">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-hd">${titles[state.modal]}<button class="drawer-close" data-action="close-modal">✕</button></div>
      <div class="modal-bd">${body}</div>
      <div class="modal-ft">
        <button class="btn" data-action="close-modal">取消</button>
        <button class="btn btn-primary" data-action="confirm-modal">确认</button>
      </div>
    </div>
  </div>`;
}

function renderDrawer() {
  if (!state.drawer) return '';
  let inner = '';
  if (state.drawer.type === 'user') {
    const u = getUser(state.drawer.id);
    if (u) inner = renderUserDrawerContent(u);
  } else if (state.drawer.type === 'batch') {
    const b = getBatch(state.drawer.id);
    if (b) inner = renderBatchDrawerContent(b);
  }
  return `<div class="drawer-mask open" data-action="close-drawer-bg"></div>
    <div class="drawer open ${state.drawer.type==='batch'?'batch-drawer':''}">${inner}</div>`;
}

function iconSvg(name) {
  const icons = {
    chart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 5 5-9"/></svg>',
    list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
    users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.85"/></svg>'
  };
  return icons[name] || '';
}

function renderShell() {
  const pg = PAGES[state.page];
  const navHtml = NAV.map(n => `
    <div class="nav-item ${state.page===n.id?'active':''} ${n.disabled?'disabled':''}"
      data-action="${n.disabled?'disabled-nav':'nav'}" data-page="${n.id||''}">
      ${n.icon ? iconSvg(n.icon) : ''}${esc(n.label)}
    </div>`).join('');

  const content = state.loading
    ? '<div class="page-inner"><div class="skeleton h40"></div><div class="skeleton h200"></div><div class="skeleton h200"></div></div>'
    : `<div class="page-inner">${state.page==='dashboard'?renderDashboard():state.page==='batch'?renderBatchPage():renderUsersPage()}</div>`;

  document.documentElement.setAttribute('data-theme', state.theme);
  $('#app').innerHTML = `
    <aside class="sidebar">
      <div class="brand"><div class="brand-title">运营 CRM</div><div class="brand-sub">用户承接与策略管理</div></div>
      <div class="nav-group"><div class="nav-l1">主导航</div>${navHtml}</div>
      <div class="sidebar-foot">v1.0 产品原型</div>
    </aside>
    <div class="main-wrap">
      <header class="header">
        <div class="header-left">
          <div class="header-title">${esc(pg.title)}</div>
          <div class="breadcrumb">${pg.bc.map((b,i)=>i?'<span>/</span>'+esc(b):esc(b)).join('')}</div>
        </div>
        <div class="header-search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="搜索用户、批次、策略..." id="globalSearch" value="${esc(state.searchQuery)}" />
          <div class="search-panel ${state.searchOpen?'open':''}" id="searchPanel">${renderSearchPanel()}</div>
        </div>
        <div class="header-tools">
          <div class="date-pill">
            <button class="${state.dateRange===7?'active':''}" data-action="date-range" data-range="7">近7天</button>
            <button class="${state.dateRange===30?'active':''}" data-action="date-range" data-range="30">近30天</button>
          </div>
          <div style="position:relative">
            <button class="icon-btn" data-action="toggle-todo" title="待办事项">🔔<span class="badge-dot"></span></button>
            <div class="todo-panel ${state.todoOpen?'open':''}">
              <div class="tp-hd">待办事项 (${MOCK.todos.length})</div>
              ${MOCK.todos.map((t,i)=>`<div class="todo-item" data-action="todo-click" data-i="${i}">${esc(t.text)}<div class="ti-time">${esc(t.time)}</div></div>`).join('')}
            </div>
          </div>
          <button class="icon-btn" data-action="toggle-theme" title="切换主题">${state.theme==='light'?'🌙':'☀️'}</button>
          <div class="role-wrap">
            <div class="role-pill" data-action="toggle-role">${esc(state.role)} ▾</div>
            <div class="role-dropdown ${state.roleOpen?'open':''}">
              <div data-action="set-role" data-role="VIP运营组">VIP运营组</div>
              <div data-action="set-role" data-role="平台运营组">平台运营组</div>
              <div data-action="set-role" data-role="市场运营组">市场运营组</div>
            </div>
          </div>
        </div>
      </header>
      <main class="content" id="mainContent">${content}</main>
    </div>`;

  $('#drawerRoot').innerHTML = renderDrawer();
  $('#modalRoot').innerHTML = renderModal();

  if (!state.loading && state.page === 'dashboard') {
    requestAnimationFrame(() => {
      drawLineChart('chartReach', MOCK.trendDays, MOCK.reachTrend, '#01696f');
      drawLineChart('chartConvert', MOCK.trendDays, MOCK.convertTrend, '#2563eb');
      drawBarChart('chartTeam', ['VIP','平台','市场'],
        [MOCK.teamVolume.VIP, MOCK.teamVolume.平台, MOCK.teamVolume.市场],
        ['#01696f','#2563eb','#7c3aed']);
    });
  }
}

function navigate(page) {
  state.page = page;
  state.loading = true;
  state.filtersExpanded = false;
  renderShell();
  setTimeout(() => { state.loading = false; renderShell(); }, 400);
}

function openUserDrawer(id) {
  state.drawer = { type:'user', id };
  state.drawerTab = 'profile';
  if (!MOCK.recentUsers.includes(id)) {
    MOCK.recentUsers.unshift(id);
    if (MOCK.recentUsers.length > 5) MOCK.recentUsers.pop();
  }
  renderShell();
}

function openBatchDrawer(id) {
  state.drawer = { type:'batch', id };
  state.batchDrawerTab = 'info';
  renderShell();
}

function closeDrawer() {
  state.drawer = null;
  renderShell();
}

/* === Events === */
function handleClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) {
    if (!e.target.closest('.header-search') && !e.target.closest('.drawer') && !e.target.closest('.modal')) {
      if (state.searchOpen || state.todoOpen || state.roleOpen) {
        state.searchOpen = false; state.todoOpen = false; state.roleOpen = false;
        renderShell();
      }
    }
    return;
  }
  const act = el.dataset.action;
  if (act === 'nav') { navigate(el.dataset.page); return; }
  if (act === 'disabled-nav') { showToast('功能开发中，敬请期待', 'warn'); return; }
  if (act === 'toggle-theme') {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    localStorage.setItem('crm-theme', state.theme);
    renderShell(); return;
  }
  if (act === 'toggle-todo') { state.todoOpen = !state.todoOpen; state.roleOpen = false; renderShell(); return; }
  if (act === 'toggle-role') { state.roleOpen = !state.roleOpen; state.todoOpen = false; renderShell(); return; }
  if (act === 'set-role') { state.role = el.dataset.role; state.roleOpen = false; showToast('已切换为 ' + state.role); renderShell(); return; }
  if (act === 'date-range') { state.dateRange = +el.dataset.range; showToast('已切换为近' + state.dateRange + '天数据'); renderShell(); return; }
  if (act === 'close-alert') { state.alertVisible = false; renderShell(); return; }
  if (act === 'open-user') { state.page = 'users'; openUserDrawer(el.dataset.id); return; }
  if (act === 'open-batch') { openBatchDrawer(el.dataset.id); return; }
  if (act === 'close-drawer' || act === 'close-drawer-bg') { closeDrawer(); return; }
  if (act === 'drawer-tab') { state.drawerTab = el.dataset.tab; renderShell(); return; }
  if (act === 'batch-drawer-tab') { state.batchDrawerTab = el.dataset.tab; renderShell(); return; }
  if (act === 'open-modal') { state.modal = el.dataset.modal; renderShell(); return; }
  if (act === 'close-modal' || act === 'close-modal-bg') { state.modal = null; renderShell(); return; }
  if (act === 'confirm-modal') {
    const msgs = { transfer:'流转申请已提交', strategy:'策略挂载成功', follow:'跟进记录已保存' };
    const m = state.modal;
    state.modal = null;
    showToast(msgs[m] || '操作成功');
    renderShell(); return;
  }
  if (act === 'toast') { showToast(el.dataset.msg || '操作成功'); return; }
  if (act === 'toggle-filters') { state.filtersExpanded = !state.filtersExpanded; renderShell(); return; }
  if (act === 'search-batch') {
    $$('[data-filter="batch"]').forEach(inp => { if (inp.name) state.batchFilters[inp.name] = inp.value; });
    state.batchPage = 1; renderShell(); return;
  }
  if (act === 'reset-batch') { state.batchFilters = {}; state.batchPage = 1; renderShell(); return; }
  if (act === 'search-user') {
    $$('[data-filter="user"]').forEach(inp => { if (inp.name) state.userFilters[inp.name] = inp.value; });
    state.userPage = 1; renderShell(); return;
  }
  if (act === 'reset-user') { state.userFilters = {}; state.userPage = 1; renderShell(); return; }
  if (act === 'select-batch') {
    const id = el.dataset.id;
    if (el.checked) state.selectedBatchIds.push(id);
    else state.selectedBatchIds = state.selectedBatchIds.filter(x => x !== id);
    renderShell(); return;
  }
  if (act === 'select-all-batch') {
    const list = filterBatches().slice((state.batchPage-1)*state.pageSize, state.batchPage*state.pageSize);
    state.selectedBatchIds = el.checked ? list.map(b => b.id) : [];
    renderShell(); return;
  }
  if (act === 'select-user') {
    const id = el.dataset.id;
    if (el.checked) state.selectedUserIds.push(id);
    else state.selectedUserIds = state.selectedUserIds.filter(x => x !== id);
    return;
  }
  if (act === 'batch-op') { showToast('批量' + el.dataset.op + '任务已创建，共 ' + state.selectedBatchIds.length + ' 个批次'); return; }
  if (act === 'export') { showToast('导出任务已创建，完成后将通知您'); return; }
  if (act === 'create-rule') { showToast('规则任务已创建'); return; }
  if (act === 'save-rule') { showToast('分层规则已保存'); return; }
  if (act === 'batch-page') { state.batchPage = +el.dataset.p; renderShell(); return; }
  if (act === 'user-page') { state.userPage = +el.dataset.p; renderShell(); return; }
  if (act === 'search-select') {
    state.searchOpen = false;
    if (el.dataset.type === 'user') { state.page = 'users'; openUserDrawer(el.dataset.id); }
    else if (el.dataset.type === 'batch') { state.page = 'batch'; navigate('batch'); setTimeout(() => openBatchDrawer(el.dataset.id), 500); }
    else showToast('已定位策略：' + el.dataset.id);
    return;
  }
  if (act === 'todo-click') { showToast('已标记待办为处理中'); state.todoOpen = false; renderShell(); return; }
}

function handleInput(e) {
  if (e.target.id === 'globalSearch') {
    state.searchQuery = e.target.value;
    state.searchOpen = true;
    const panel = $('#searchPanel');
    if (panel) panel.innerHTML = renderSearchPanel();
    panel.classList.add('open');
  }
  if (e.target.dataset.rule) {
    state.ruleForm[e.target.dataset.rule] = e.target.type === 'number' ? +e.target.value : e.target.value;
    const est = Math.round(12450 * (state.ruleForm.deposit / 500) * (state.ruleForm.activeDays / 3) * (state.ruleForm.vip === 'yes' ? 0.6 : 1));
    const el = $('#ruleEstimate');
    if (el) el.textContent = est.toLocaleString();
  }
}

function handleFocus(e) {
  if (e.target.id === 'globalSearch') { state.searchOpen = true; renderShell(); }
}

/* === Init === */
document.addEventListener('click', handleClick);
document.addEventListener('input', handleInput);
document.addEventListener('focusin', handleFocus);
window.addEventListener('resize', () => {
  if (state.page === 'dashboard' && !state.loading) {
    drawLineChart('chartReach', MOCK.trendDays, MOCK.reachTrend, '#01696f');
    drawLineChart('chartConvert', MOCK.trendDays, MOCK.convertTrend, '#2563eb');
    drawBarChart('chartTeam', ['VIP','平台','市场'],
      [MOCK.teamVolume.VIP, MOCK.teamVolume.平台, MOCK.teamVolume.市场],
      ['#01696f','#2563eb','#7c3aed']);
  }
});
renderShell();
</script>
</body>
</html>
